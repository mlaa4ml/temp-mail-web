services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: temp-mail-web:latest
    container_name: temp-mail-web
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/", ">/dev/null", "2>&1"]
      interval: 30s
      timeout: 3s
      retries: 3
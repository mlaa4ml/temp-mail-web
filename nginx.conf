# Конфиг nginx для SPA temp-mail-web.
# Заменяет дефолтный /etc/nginx/conf.d/default.conf.

server {
	listen ${PORT} default_server;
	listen [::]:${PORT} default_server;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	# Безопасность: запрещаем показ файлов в скрытых каталогах (.git, .env и т.д.)
	location ~ /\. {
		deny all;
		return 404;
	}

	# Долгий кеш для статических ассетов Vite (имена с хешем)
	location /assets/ {
		access_log off;
		add_header Cache-Control "public, max-age=31536000, immutable";
		try_files $uri =404;
	}

	# Favicon и manifest — тоже кешируем
	location = /favicon.svg {
		add_header Cache-Control "public, max-age=86400";
		access_log off;
	}

	# Сжатие для экономии трафика
	gzip on;
	gzip_vary on;
	gzip_min_length 1024;
	gzip_proxied any;
	gzip_comp_level 6;
	gzip_types
		text/plain
		text/css
		text/javascript
		text/xml
		application/javascript
		application/json
		application/xml
		application/xml+rss
		application/wasm
		image/svg+xml;

	# SPA fallback: все неизвестные пути ведут к index.html
	location / {
		try_files $uri $uri/ /index.html;
		add_header Cache-Control "no-cache, no-store, must-revalidate";
	}

	# Стандартные security-заголовки
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "SAMEORIGIN" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	add_header Permissions-Policy "interest-cohort=()" always;
}